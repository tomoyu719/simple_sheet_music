name: Deploy Glyph Catalog to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'catalog/**'
      - 'lib/**'
      - '.github/workflows/deploy_catalog.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: 'stable'
      - run: flutter pub get
      - working-directory: catalog
        run: flutter pub get
      - working-directory: catalog
        run: flutter build web --release --base-href "/simple_sheet_music/"
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: catalog/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
